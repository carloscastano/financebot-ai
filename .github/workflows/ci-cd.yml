name: FINANCEBOT-IA CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ────────────────────────────────────────────────────────────
  # 1) Tests locales (regex EmailParser) — corre en Node, sin creds
  # ────────────────────────────────────────────────────────────
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Run EmailParser unit tests
        run: npm test

  # ────────────────────────────────────────────────────────────
  # 2) QA remoto (opcional — solo si gas-run.js está en el checkout)
  # ────────────────────────────────────────────────────────────
  qa:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Run QA skill (si gas-run.js disponible)
        run: |
          if [ -f scripts/gas-run.js ]; then
            node scripts/gas-run.js run_checkQA || exit 1
          else
            echo 'scripts/gas-run.js gitignored — skipping remote QA (tests locales ya pasaron).'
          fi

  # ────────────────────────────────────────────────────────────
  # 3) Deploy a GAS — usa .clasp.json (rootDir: ./src está versionado)
  # ────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: qa
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Verificar rootDir en .clasp.json
        run: |
          node -e "const c=require('./.clasp.json'); if(c.rootDir!=='./src'){console.error('rootDir debe ser ./src, es: '+c.rootDir); process.exit(1);} console.log('✓ rootDir='+c.rootDir);"
      - name: Set up clasp
        run: npm install -g @google/clasp@2.4.2
      - name: Authenticate clasp
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}
        run: echo "$CLASPRC" > ~/.clasprc.json
      - name: Deploy to Google Apps Script
        run: |
          clasp push --force
          clasp deploy -d "CI/CD auto-deploy $GITHUB_SHA"

  # ────────────────────────────────────────────────────────────
  # 4) Notify — alerta Telegram si algo falló
  # ────────────────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [tests, qa, deploy]
    if: failure()
    steps:
      - name: Notify on failure (Telegram)
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ FINANCEBOT-IA CI/CD falló
            Commit: ${{ github.sha }}
            Autor: ${{ github.actor }}
            Detalles: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
